#-----------------------------------------------------------------------
# MinervaDB Server: haproxy.cfg - HAProxy load balancer for ClickHouse
#-----------------------------------------------------------------------

global
    log /dev/log local0
    log /dev/log local1 notice
    maxconn 50000
    user haproxy
    group haproxy
    daemon
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s

defaults
    log global
    mode tcp
    option tcplog
    option dontlognull
    timeout connect 5000ms
    timeout client 300000ms
    timeout server 300000ms
    retries 3

listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 30s
    stats admin if LOCALHOST

frontend clickhouse_native
    bind *:9000
    default_backend clickhouse_native_backend

backend clickhouse_native_backend
    balance roundrobin
    option tcp-check
    server ch-node1 ch-node1:9000 check inter 5000ms rise 2 fall 3
    server ch-node2 ch-node2:9000 check inter 5000ms rise 2 fall 3
    server ch-node3 ch-node3:9000 check inter 5000ms rise 2 fall 3 backup

frontend clickhouse_http
    bind *:8123
    default_backend clickhouse_http_backend

backend clickhouse_http_backend
    balance leastconn
    option httpchk GET /ping
    http-check expect string Ok.
    server ch-node1 ch-node1:8123 check inter 5000ms rise 2 fall 3
    server ch-node2 ch-node2:8123 check inter 5000ms rise 2 fall 3
    server ch-node3 ch-node3:8123 check inter 5000ms rise 2 fall 3 backup

frontend clickhouse_https
    bind *:8443
    default_backend clickhouse_https_backend

backend clickhouse_https_backend
    balance leastconn
    option tcp-check
    server ch-node1 ch-node1:8443 check inter 5000ms rise 2 fall 3
    server ch-node2 ch-node2:8443 check inter 5000ms rise 2 fall 3
    server ch-node3 ch-node3:8443 check inter 5000ms rise 2 fall 3 backup
