# MinervaDB Server: prometheus.yml
# Prometheus configuration for ClickHouse monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: "minervadb"
    environment: "production"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

rule_files:
  - "alerts/clickhouse.rules.yml"

scrape_configs:
  - job_name: "clickhouse"
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "ch-node1:9363"
          - "ch-node2:9363"
          - "ch-node3:9363"
        labels:
          cluster: "minervadb_cluster"

  - job_name: "clickhouse-keeper"
    scrape_interval: 30s
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "keeper1:9181"
          - "keeper2:9181"
          - "keeper3:9181"
        labels:
          role: "keeper"

  - job_name: "haproxy"
    scrape_interval: 30s
    static_configs:
      - targets:
          - "haproxy:8404"
    metrics_path: "/metrics"

  - job_name: "node"
    scrape_interval: 30s
    static_configs:
      - targets:
          - "ch-node1:9100"
          - "ch-node2:9100"
          - "ch-node3:9100"
          - "keeper1:9100"
          - "keeper2:9100"
          - "keeper3:9100"

  - job_name: "kafka"
    scrape_interval: 60s
    static_configs:
      - targets:
          - "kafka1:7071"
          - "kafka2:7071"
          - "kafka3:7071"
        labels:
          cluster: "minervadb_kafka"
